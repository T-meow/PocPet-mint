name: Build Pocpet-Mint Releases

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: stable

jobs:
  windows:
    name: Windows exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build portable exe
        shell: powershell
        run: npm.cmd run package:win:portable

      - name: Export artifact
        shell: powershell
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item -LiteralPath "release\Pocpet-Mint-$version-windows-portable.exe" -Destination "artifacts\Pocpet-Mint-$version.exe" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pocpet-Mint-windows
          path: artifacts/*

  android:
    name: Android arm64 APK
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install dependencies
        run: npm ci

      - name: Build Android native library
        shell: powershell
        run: |
          npm.cmd run tauri:android:build
          if ($LASTEXITCODE -ne 0) {
            Write-Host "tauri android build may fail on Windows symlink permission after native library build. Continue with packaging script."
          }

      - name: Build debug-signed APK
        shell: powershell
        run: npm.cmd run package:android:arm64

      - name: Export artifact
        shell: powershell
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item -LiteralPath "release\Pocpet-Mint-$version-arm64-release-debugsigned.apk" -Destination "artifacts\Pocpet-Mint-$version.apk" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pocpet-Mint-android-arm64
          path: artifacts/*

  linux:
    name: Linux AppImage and deb
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf build-essential curl wget file

      - name: Install dependencies
        run: npm ci

      - name: Build Linux bundles
        run: npm run package:desktop

      - name: Export artifacts
        run: |
          version=$(node -p "require('./package.json').version")
          mkdir -p artifacts
          find src-tauri/target/release/bundle -type f \( -name '*.AppImage' -o -name '*.deb' \) -print -exec cp {} artifacts/ \;
          for file in artifacts/*; do
            [ -f "$file" ] || continue
            ext="${file##*.}"
            cp "$file" "artifacts/Pocpet-Mint-$version-linux.${ext}"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pocpet-Mint-linux
          path: artifacts/*

  macos:
    name: macOS dmg and app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build macOS bundles
        run: npm run package:desktop -- --no-sign

      - name: Export artifacts
        run: |
          version=$(node -p "require('./package.json').version")
          mkdir -p artifacts
          find src-tauri/target/release/bundle -type f \( -name '*.dmg' -o -name '*.app.tar.gz' \) -print -exec cp {} artifacts/ \; || true
          find src-tauri/target/release/bundle -type d -name '*.app' -print0 | while IFS= read -r -d '' app; do
            tar -czf "artifacts/Pocpet-Mint-$version-macos.app.tar.gz" -C "$(dirname "$app")" "$(basename "$app")"
          done
          for dmg in artifacts/*.dmg; do
            [ -f "$dmg" ] || continue
            cp "$dmg" "artifacts/Pocpet-Mint-$version-macos.dmg"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pocpet-Mint-macos
          path: artifacts/*

  release:
    name: Publish Gitee Release
    needs: [windows, android, linux, macos]
    runs-on: ubuntu-22.04
    if: startsWith(gitee.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release

      - name: Publish to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          if [ -z "$GITEE_TOKEN" ] || [ -z "$GITEE_OWNER" ] || [ -z "$GITEE_REPO" ]; then
            echo "GITEE_TOKEN, GITEE_OWNER, and GITEE_REPO are required to publish a release."
            exit 1
          fi
          tag="${GITHUB_REF_NAME:-${GITEE_REF_NAME:-manual}}"
          body="Automated Pocpet-Mint build for ${tag}."
          response=$(curl -sS -X POST "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases" \
            -F "access_token=${GITEE_TOKEN}" \
            -F "tag_name=${tag}" \
            -F "name=Pocpet-Mint ${tag}" \
            -F "body=${body}" \
            -F "prerelease=false")
          echo "$response"
          upload_url=$(echo "$response" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const j=JSON.parse(s); console.log(j.upload_url || '')})")
          if [ -z "$upload_url" ]; then
            echo "Gitee release was created or already exists, but upload_url was not returned. Upload artifacts manually if this runner does not expose Gitee release upload API."
            find dist-release -type f -maxdepth 3 -print
            exit 0
          fi
          find dist-release -type f -maxdepth 3 -print0 | while IFS= read -r -d '' file; do
            echo "Uploading $file"
            curl -sS -X POST "$upload_url" -F "access_token=${GITEE_TOKEN}" -F "file=@${file}"
          done