name: Pocpet-Mint CI and Release

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      full_build:
        description: "Build all release artifacts: Windows x64/x86, Android arm64/ARMv7, web, macOS, and Linux"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: stable
  ANDROID_NDK_VERSION: "27.0.12077973"

jobs:
  metadata:
    name: Build metadata
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_build: ${{ steps.meta.outputs.release_build }}
      full_build: ${{ steps.meta.outputs.full_build }}
      publish_release: ${{ steps.meta.outputs.publish_release }}
    env:
      MANUAL_FULL_BUILD: ${{ inputs.full_build || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Detect version and build scope
        id: meta
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")

          release_build=false
          if [[ "${GITHUB_REF}" == refs/tags/v* || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_build=true
          fi

          full_build=false
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.0($|[-+]) ]]; then
            full_build=true
          fi
          if [[ "${MANUAL_FULL_BUILD}" == "true" ]]; then
            full_build=true
          fi

          publish_release=false
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            publish_release=true
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_build=$release_build" >> "$GITHUB_OUTPUT"
          echo "full_build=$full_build" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"

  validate:
    name: Frontend build check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  windows:
    name: Windows x64 portable
    needs: metadata
    if: needs.metadata.outputs.release_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build portable exe
        shell: powershell
        run: npm.cmd run package:win:portable

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: pp-Mint-windows-x64-${{ needs.metadata.outputs.version }}
          path: release/pp-Mint${{ needs.metadata.outputs.version }}.exe
          if-no-files-found: error

  windows_x86:
    name: Windows 32-bit portable
    needs: metadata
    if: needs.metadata.outputs.release_build == 'true' && needs.metadata.outputs.full_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build 32-bit portable exe
        shell: powershell
        run: npm.cmd run package:win:portable:x86

      - name: Upload Windows 32-bit artifact
        uses: actions/upload-artifact@v4
        with:
          name: pp-Mint-windows-x86-${{ needs.metadata.outputs.version }}
          path: release/pp-Mint${{ needs.metadata.outputs.version }}-win32.exe
          if-no-files-found: error

  android:
    name: Android arm64 APK
    needs: metadata
    if: needs.metadata.outputs.release_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: powershell
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;${{ env.ANDROID_NDK_VERSION }}"
          $ndkPath = Join-Path $env:ANDROID_HOME "ndk\${{ env.ANDROID_NDK_VERSION }}"
          "ANDROID_NDK_HOME=$ndkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NDK_HOME=$ndkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        run: npm ci

      - name: Build debug-signed APK
        shell: powershell
        run: npm.cmd run package:android:arm64

      - name: Upload Android arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: pp-Mint-android-arm64-${{ needs.metadata.outputs.version }}
          path: release/pp-Mint${{ needs.metadata.outputs.version }}.apk
          if-no-files-found: error

  android_armv7:
    name: Android 32-bit ARMv7 APK
    needs: metadata
    if: needs.metadata.outputs.release_build == 'true' && needs.metadata.outputs.full_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: powershell
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;${{ env.ANDROID_NDK_VERSION }}"
          $ndkPath = Join-Path $env:ANDROID_HOME "ndk\${{ env.ANDROID_NDK_VERSION }}"
          "ANDROID_NDK_HOME=$ndkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NDK_HOME=$ndkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        run: npm ci

      - name: Build 32-bit debug-signed APK
        shell: powershell
        run: npm.cmd run package:android:armv7

      - name: Upload Android 32-bit artifact
        uses: actions/upload-artifact@v4
        with:
          name: pp-Mint-android-armv7-${{ needs.metadata.outputs.version }}
          path: release/pp-Mint${{ needs.metadata.outputs.version }}-32bit.apk
          if-no-files-found: error

  web:
    name: Web package
    needs: metadata
    if: needs.metadata.outputs.release_build == 'true' && needs.metadata.outputs.full_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web zip
        shell: powershell
        run: npm.cmd run package:web

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: pp-Mint-web-${{ needs.metadata.outputs.version }}
          path: release/pp-Mint${{ needs.metadata.outputs.version }}-web.zip
          if-no-files-found: error

  linux:
    name: Linux bundles
    needs: metadata
    if: needs.metadata.outputs.release_build == 'true' && needs.metadata.outputs.full_build == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf build-essential curl wget file

      - name: Install dependencies
        run: npm ci

      - name: Build Linux bundles
        run: npm run package:desktop

      - name: Export Linux artifacts
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          mkdir -p artifacts
          appimage=$(find src-tauri/target/release/bundle -type f -name '*.AppImage' | head -n 1)
          if [[ -z "$appimage" ]]; then
            echo "No AppImage found."
            exit 1
          fi
          cp "$appimage" "artifacts/pp-Mint${version}-ubuntu.AppImage"

          deb=$(find src-tauri/target/release/bundle -type f -name '*.deb' | head -n 1 || true)
          if [[ -n "$deb" ]]; then
            cp "$deb" "artifacts/pp-Mint${version}-ubuntu.deb"
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pp-Mint-linux-${{ needs.metadata.outputs.version }}
          path: artifacts/*
          if-no-files-found: error

  macos:
    name: macOS dmg
    needs: metadata
    if: needs.metadata.outputs.release_build == 'true' && needs.metadata.outputs.full_build == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build macOS bundle
        run: npm run package:desktop -- --no-sign

      - name: Export macOS artifact
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          mkdir -p artifacts
          dmg=$(find src-tauri/target/release/bundle -type f -name '*.dmg' | head -n 1)
          if [[ -z "$dmg" ]]; then
            echo "No dmg found."
            exit 1
          fi
          cp "$dmg" "artifacts/pp-Mint${version}-mac.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pp-Mint-macos-${{ needs.metadata.outputs.version }}
          path: artifacts/pp-Mint${{ needs.metadata.outputs.version }}-mac.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - metadata
      - validate
      - windows
      - windows_x86
      - android
      - android_armv7
      - web
      - linux
      - macos
    if: |
      always() &&
      needs.metadata.outputs.publish_release == 'true' &&
      needs.validate.result == 'success' &&
      needs.windows.result == 'success' &&
      needs.android.result == 'success' &&
      (
        needs.metadata.outputs.full_build != 'true' ||
        (
          needs.windows_x86.result == 'success' &&
          needs.android_armv7.result == 'success' &&
          needs.web.result == 'success' &&
          needs.linux.result == 'success' &&
          needs.macos.result == 'success'
        )
      )
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Pocpet-Mint ${{ github.ref_name }}
          files: dist-release/*
          fail_on_unmatched_files: true
